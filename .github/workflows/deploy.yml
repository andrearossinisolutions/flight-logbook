name: Deploy logbook

on:
  push:
    branches:
      - main

concurrency:
  group: logbook-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Show runtime versions
        run: |
          which node
          node -v
          npm -v

      - name: Deploy locally on server
        run: /var/www/logbook/scripts/deploy.sh